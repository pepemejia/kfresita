<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin · K-Fresita</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="admin-body">
    <header class="admin-topbar">
      <div>
        <h1>Panel de administrador</h1>
        <p>Gestiona productos, pedidos y ventas.</p>
      </div>
      <div class="inline-actions">
        <a class="button gold" href="/" target="_blank" rel="noreferrer">Ver sitio</a>
        <a class="button outline" href="/api/sales/download">Descargar ventas CSV</a>
        <button class="button outline" type="button" id="logoutButton">Cerrar sesión</button>
      </div>
    </header>

    <main class="admin-layout">
      <section class="admin-panel">
        <div class="section-head">
          <h2>Productos y precios</h2>
          <button class="button gold" type="button" id="saveContentButton">Guardar cambios</button>
        </div>
        <p class="admin-help">Edita cada producto usando: título, descripción, precio e imagen.</p>
        <div id="productsEditor" class="editor-grid"></div>
        <div class="inline-actions top-gap">
          <button class="button outline" type="button" id="addProductButton">Agregar producto</button>
        </div>
        <p id="contentStatus" class="status"></p>
      </section>

      <section class="admin-panel">
        <div class="section-head">
          <h2>Pedidos</h2>
          <button class="button outline" type="button" id="refreshOrdersButton">Actualizar</button>
        </div>
        <div id="ordersList" class="admin-list"></div>
      </section>

      <section class="admin-panel">
        <div class="section-head">
          <h2>Registro de ventas</h2>
          <button class="button outline" type="button" id="refreshSalesButton">Actualizar</button>
        </div>
        <div id="salesList" class="admin-list"></div>
      </section>
    </main>

    <script src="./admin.js"></script>
  </body>
</html>
