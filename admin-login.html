<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso administrador · K-Fresita</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="admin-login-body">
    <div class="login-wrap">
      <form class="login-card" id="adminLoginForm">
        <h1>Acceso al panel</h1>
        <p>Ingresa el código de seguridad para abrir el panel de administrador.</p>
        <label>Código de seguridad<input type="password" id="adminCode" placeholder="Ingresa tu código" required /></label>
        <button type="submit">Entrar</button>
        <p id="loginStatus" class="status"></p>
      </form>
    </div>
    <script src="./admin-login.js"></script>
  </body>
</html>
